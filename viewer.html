<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulator Workstations Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .refresh-info {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        .workstations {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            grid-auto-flow: row;
        }

        .workstation {
            background: white;
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            padding: 15px;
            overflow: visible;
            display: flex;
            flex-direction: column;
        }

        .workstation-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px;
            margin: -15px -15px 12px -15px;
            border-radius: 10px 10px 0 0;
            font-size: 1.1em;
            font-weight: bold;
        }

        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
        }

        .property {
            padding: 8px;
            background: #f5f5f5;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }

        .property-name {
            font-weight: bold;
            color: #333;
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .property-value {
            font-size: 0.8em;
            color: #667eea;
            margin-top: 3px;
            font-family: 'Courier New', monospace;
            word-break: break-word;
        }

        .stack-light {
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
            text-align: center;
            margin-top: 10px;
        }

        .stack-light.green {
            background: #4caf50;
            color: white;
        }

        .stack-light.yellow {
            background: #ff9800;
            color: white;
        }

        .stack-light.red {
            background: #f44336;
            color: white;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 5px;
            border-left: 4px solid #f44336;
        }

        .loading {
            text-align: center;
            color: #999;
            padding: 20px;
        }

        .timestamp {
            color: #999;
            font-size: 0.7em;
            margin-top: 8px;
            text-align: right;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>🏭 Simulator Workstations Monitor</h1>
        <div class="refresh-info">
            Auto-refreshing every 2 seconds • Last update: <span id="lastUpdate">--:--:--</span>
        </div>

        <div class="workstations">
            <div class="workstation">
                <div class="workstation-header">Storage Rack</div>
                <div id="storageRack" class="loading">Loading...</div>
                <div class="timestamp">Last updated: <span id="storageRack-time">--</span></div>
            </div>

            <div class="workstation">
                <div class="workstation-header">Filling Workshop</div>
                <div id="fillingWorkshop" class="loading">Loading...</div>
                <div class="timestamp">Last updated: <span id="fillingWorkshop-time">--</span></div>
            </div>

            <div class="workstation">
                <div class="workstation-header">Packaging Workshop</div>
                <div id="packagingWorkshop" class="loading">Loading...</div>
                <div class="timestamp">Last updated: <span id="packagingWorkshop-time">--</span></div>
            </div>

            <div class="workstation">
                <div class="workstation-header">Robot Arm</div>
                <div id="robotArm" class="loading">Loading...</div>
                <div class="timestamp">Last updated: <span id="robotArm-time">--</span></div>
            </div>
        </div>
    </div>

    <script>
        const WORKSTATIONS = [
            { id: 'storageRack', name: 'storageRack', label: 'Storage Rack' },
            { id: 'fillingWorkshop', name: 'fillingWorkshop', label: 'Filling Workshop' },
            { id: 'packagingWorkshop', name: 'packagingWorkshop', label: 'Packaging Workshop' },
            { id: 'robotArm', name: 'robotArm', label: 'Robot Arm' }
        ];

        async function fetchProperties(workstationName) {
            const url = `/api/properties/${workstationName}`;
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                return await response.json();
            } catch (error) {
                throw new Error(`Failed to fetch: ${error.message}`);
            }
        }

        function formatValue(value) {
            if (typeof value === 'boolean') {
                return value ? '✓ True' : '✗ False';
            }
            if (typeof value === 'number') {
                return value.toFixed(2);
            }
            if (Array.isArray(value)) {
                return `[${value.join(', ')}]`;
            }
            return String(value);
        }

        function renderProperties(properties) {
            // Handle both objects and arrays
            if (!properties || typeof properties !== 'object') {
                return '<div class="error">Invalid properties format</div>';
            }

            let html = '<div class="status-grid">';

            // Get keys (handles both objects and arrays)
            const keys = Array.isArray(properties)
                ? properties.map((_, i) => i.toString())
                : Object.keys(properties).sort();

            for (const key of keys) {
                const value = properties[key];

                if (key === 'stackLightStatus') {
                    // Handle stack light specially
                    html += `<div class="stack-light ${String(value).toLowerCase()}">${String(value).toUpperCase()}</div>`;
                } else {
                    // Skip numeric keys from arrays that are already formatted poorly
                    const displayKey = isNaN(key) ? key : `Item ${key}`;
                    html += `
                        <div class="property">
                            <div class="property-name">${displayKey}</div>
                            <div class="property-value">${formatValue(value)}</div>
                        </div>
                    `;
                }
            }

            html += '</div>';
            return html;
        }

        async function updateWorkstation(workstation) {
            const element = document.getElementById(workstation.id);
            const timeElement = document.getElementById(`${workstation.id}-time`);

            try {
                const properties = await fetchProperties(workstation.name);
                element.innerHTML = renderProperties(properties);
                timeElement.textContent = new Date().toLocaleTimeString();
            } catch (error) {
                element.innerHTML = `<div class="error">⚠ ${error.message}</div>`;
                timeElement.textContent = 'Error';
            }
        }

        async function updateAll() {
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
            for (const ws of WORKSTATIONS) {
                await updateWorkstation(ws);
            }
        }

        // Initial update
        updateAll();

        // Refresh every 2 seconds
        setInterval(updateAll, 2000);
    </script>
</body>
</html>
